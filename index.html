<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eKigai Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f7f6; }
        button { padding: 12px 24px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #output { margin-top: 30px; padding: 15px; border-radius: 5px; display: inline-block; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
    </style>
</head>
<body>

    <h1>eKigai Automation Simulator</h1>
    <p>Click the button below to trigger the background data validation pipeline.</p>
    
    <button id="validateBtn">Trigger Validation Pipeline</button>

    <div id="output">
        <h3>📊 Pipeline Output:</h3>
        <pre id="jsonData"></pre>
    </div>

    <script>
        document.getElementById('validateBtn').addEventListener('click', async () => {
            const btn = document.getElementById('validateBtn');
            const outputDiv = document.getElementById('output');
            const jsonPre = document.getElementById('jsonData');

            btn.innerText = "Processing in Background...";
            btn.disabled = true;

            try {
                // Call our live server backend endpoint
                const response = await fetch('/trigger-validation');
                const data = await response.json();
                
                // Render the output directly to the screen
                jsonPre.innerText = JSON.stringify(data, null, 2);
                outputDiv.style.display = "inline-block";
            } catch (error) {
                jsonPre.innerText = "Error running background validation.";
            } finally {
                btn.innerText = "Trigger Validation Pipeline";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
